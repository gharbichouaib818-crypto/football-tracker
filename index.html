    <script>
        let adIndex = 0;
        const adLinks = ["https://omg10.com/4/11175198", "https://omg10.com/4/11175191"];

        function handleAdClick(name, links, isDazn) {
            window.open(adLinks[adIndex], '_blank');
            adIndex = (adIndex + 1) % adLinks.length;
            if (isDazn) { loadChannelDazn(name, links); } else { loadChannel(name, links); }
        }

        function handleAdClickFox(name, links) {
            window.open(adLinks[adIndex], '_blank');
            adIndex = (adIndex + 1) % adLinks.length;
            loadChannelFox(name, links);
        }

        function showSection(sectionId) { document.getElementById('main-menu').style.display = 'none'; document.getElementById(sectionId).style.display = 'block'; }
        
        function goHome() { 
            document.getElementById('main-menu').style.display = 'flex'; 
            document.querySelectorAll('.page-section').forEach(section => section.style.display = 'none');
            document.getElementById('video-frame').src = '';
            document.getElementById('video-frame-dazn').src = '';
            document.getElementById('video-frame-fox').src = '';
        }

        function loadChannelFox(name, links) {
            document.getElementById('selected-channel-name-fox').innerText = name;
            document.getElementById('video-frame-fox').src = links[0];
            const serverContainer = document.getElementById('server-buttons-fox');
            serverContainer.innerHTML = ''; 
            links.forEach((link, index) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn';
                btn.innerText = 'Server ' + (index + 1);
                btn.onclick = () => { document.getElementById('video-frame-fox').src = link; };
                serverContainer.appendChild(btn);
            });
        }
