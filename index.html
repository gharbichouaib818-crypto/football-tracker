<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-image: url('balla.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            color: white;
        }
        #main-menu { display: block; }
        #bein-section { display: none; text-align: center; }
        
        .nav-btn { 
            background: rgba(255, 255, 255, 0.2); 
            border: 2px solid white; 
            padding: 20px; 
            cursor: pointer; 
            border-radius: 10px;
        }
        .nav-btn img { width: 200px; height: auto; }

        /* Channel Button Styling */
        .channel-list { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .channel-btn {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 auto;
            width: 300px;
        }
        .channel-icon { width: 20px; height: 20px; }

        /* Player Styles */
        #player-container { margin-top: 20px; }
        iframe { width: 800px; height: 450px; border: 2px solid white; background: black; }
        .server-btn { margin: 5px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Main View -->
    <div id="main-menu">
        <button class="nav-btn" onclick="showBeinPage()">
            <img src="BeIN_Sports_logo.svg" alt="BeIN Sports">
        </button>
    </div>

    <!-- BeIN Sports Page -->
    <div id="bein-section">
        <h1>BeIN Sports</h1>
        
        <div class="channel-list">
            <!-- Updated Channel 1 -->
            <button onclick="loadChannel('Bein Arabic 4K Quality', ['https://dlhd.pk/stream/stream-967.php', 'https://dlhd.pk/cast/stream-967.php', 'https://dlhd.pk/watch/stream-967.php', 'https://dlhd.pk/plus/stream-967.php', 'https://dlhd.pk/casting/stream-967.php', 'https://dlhd.pk/player/stream-967.php'])" class="channel-btn">
                <img src="BeIN_Sports_logo.svg" class="channel-icon">
                Bein Arabic 4K Quality
            </button>

            <!-- Channel 2 -->
            <button onclick="loadChannel('beIN Sports 1 Arabic', ['https://dlhd.pk/stream/stream-91.php', 'https://dlhd.pk/cast/stream-91.php', 'https://dlhd.pk/watch/stream-91.php', 'https://dlhd.pk/plus/stream-91.php', 'https://dlhd.pk/casting/stream-91.php', 'https://dlhd.pk/player/stream-91.php'])" class="channel-btn">
                <img src="BeIN_Sports_logo.svg" class="channel-icon">
                beIN Sports 1 Arabic
            </button>
            
            <!-- Channel 3 -->
            <button onclick="loadChannel('beIN Sports 2 Arabic', ['https://dlhd.pk/stream/stream-92.php', 'https://dlhd.pk/cast/stream-92.php', 'https://dlhd.pk/watch/stream-92.php', 'https://dlhd.pk/plus/stream-92.php', 'https://dlhd.pk/casting/stream-92.php', 'https://dlhd.pk/player/stream-92.php'])" class="channel-btn">
                <img src="BeIN_Sports_logo.svg" class="channel-icon">
                beIN Sports 2 Arabic
            </button>
        </div>

        <!-- Player and Servers -->
        <div id="player-container" style="display: none;">
            <h2 id="selected-channel-name"></h2>
            <iframe id="video-frame" 
                    src="" 
                    allow="fullscreen; autoplay; encrypted-media" 
                    allowfullscreen>
            </iframe>
            <div id="server-buttons">
                <!-- Buttons will be updated by JS -->
            </div>
        </div>
    </div>

    <script>
        function showBeinPage() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('bein-section').style.display = 'block';
        }

        function loadChannel(name, links) {
            document.getElementById('selected-channel-name').innerText = name;
            document.getElementById('player-container').style.display = 'block';
            
            // Auto play Server 1
            document.getElementById('video-frame').src = links[0];
            
            // Update server buttons
            const serverContainer = document.getElementById('server-buttons');
            serverContainer.innerHTML = ''; // Clear old buttons
            
            links.forEach((link, index) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn';
                btn.innerText = 'Server ' + (index + 1);
                btn.onclick = () => { document.getElementById('video-frame').src = link; };
                serverContainer.appendChild(btn);
            });
        }
    </script>
</body>
</html>
