<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-image: url('balla.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #main-menu { display: block; }
        #bein-section { display: none; color: white; text-align: center; }
        .nav-btn { background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Main View -->
    <div id="main-menu">
        <button class="nav-btn" onclick="showBeinPage()">
            <img src="BeIN_Sports_logo.svg" alt="BeIN Sports Button">
        </button>
    </div>

    <!-- BeIN Sports Page (Empty) -->
    <div id="bein-section">
        <h1>BeIN Sports</h1>
    </div>

    <script>
        function showBeinPage() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('bein-section').style.display = 'block';
        }
    </script>
</body>
</html>
