<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream</title>
    <script src="https://quge5.com/88/tag.min.js" data-zone="251698" async data-cfasync="false"></script>
    
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .ad-container { 
            width: 80%; margin: 50px auto; min-height: 300px; 
            background: rgba(0, 255, 136, 0.2); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; border: 2px dashed #00ff88; 
            border-radius: 12px; padding: 20px;
        }
        #live-stream {
            display: none;
            margin-top: 20px;
        }
        .server-buttons { margin-bottom: 20px; }
        .server-btn { background: #00ff88; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; margin: 5px; }
        h2 { color: #ff3333; }
        .instruction-text { font-size: 18px; margin: 10px 0; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="partner-spot">
        <div class="ad-container" id="ad-container">
            <div class="instruction-text" id="click-text">(0/10) brave browser استخدام لتخطي الاعلانات</div>
            <div class="instruction-text">استخدم تطبيق <br> Urban VPN <br> وضعه على انجلترا</div>
        </div>
    </div>

    <div id="live-stream">
        <h2>🔴 مباشرة: ألمانيا ضد ساحل العاج</h2>
        
        <div class="server-buttons">
            <button class="server-btn" onclick="changeServer(server1Node)">السيرفر 1</button>
            <button class="server-btn" onclick="changeServer(server2Node)">السيرفر 2</button>
            <button class="server-btn" onclick="changeServer(server3Node)">السيرفر 3</button>
        </div>
        
        <div id="video-container">
            <iframe src="https://footybite.ac/event/germany-vs-ivory-coast" width="100%" height="500" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const server1Node = `<iframe src="https://footybite.ac/event/germany-vs-ivory-coast" width="100%" height="500" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        const server2Node = `<iframe src="https://daddylive.li/live/stream=967-3d" width="100%" height="500" style="border:0;" allow="autoplay; fullscreen *; picture-in-picture *; encrypted-media" allowfullscreen webkitallowfullscreen mozallowfullscreen></iframe>`;
        const server3Node = `<iframe src="https://techfare.info/match/germany-vs-ivory-coast-8fca92ae" width="100%" height="500" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;

        function changeServer(nodeString) {
            document.getElementById('video-container').innerHTML = nodeString;
        }

        let clicks = 0;
        const adContainer = document.getElementById('ad-container');
        const liveStream = document.getElementById('live-stream');
        const clickText = document.getElementById('click-text');

        adContainer.addEventListener('click', () => {
            window.open('https://omg10.com/4/11175203', '_blank');
            clicks++;
            clickText.innerText = `(${clicks}/10) brave browser استخدام لتخطي الاعلانات`;

            if (clicks >= 10) {
                document.getElementById('partner-spot').style.display = 'none';
                liveStream.style.display = 'block';
            }
        });
    </script>
</body>
</html>
