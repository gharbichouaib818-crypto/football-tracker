<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Streaming Hub</title>
    <style>
        body {
            background-image: url('balla.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: white;
        }
        #main-menu { display: flex; justify-content: center; align-items: center; gap: 30px; height: 100vh; }
        .nav-btn { background: rgba(0,0,0,0.5); border: 2px solid white; padding: 20px; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .nav-btn:hover { transform: scale(1.05); }
        .page-section { display: none; padding: 20px; }
        .back-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 10px; cursor: pointer; border-radius: 5px; margin-bottom: 20px; }
        .main-layout { display: flex; justify-content: center; align-items: flex-start; gap: 20px; }
        .channel-column { display: flex; flex-direction: column; gap: 8px; max-height: 85vh; overflow-y: auto; width: 250px; }
        .pill-btn { border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; text-align: left; background: rgba(255,255,255,0.1); color: white; transition: 0.2s; }
        .pill-btn:hover { background: rgba(255,255,255,0.3); }
        .center-area { width: 650px; text-align: center; }
        .player-container { background: black; padding: 15px; border-radius: 10px; border: 1px solid #444; }
        iframe { width: 100%; height: 360px; border: none; background: #111; }
        .server-buttons { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .server-btn { padding: 5px 12px; cursor: pointer; border-radius: 4px; border: none; font-size: 11px; background: #333; color: white; }
    </style>
</head>
<body>

    <div id="main-menu">
        <button class="nav-btn" onclick="showSection('bein-section')"><img src="BeIN_Sports_logo.svg" alt="BeIN" width="150"></button>
        <button class="nav-btn" onclick="showSection('dazn-section')"><img src="DAZN_Channel_(2021)_Logo.svg" alt="DAZN" width="150"></button>
    </div>

    <div id="bein-section" class="page-section">
        <button class="back-btn" onclick="goHome()">← Back</button>
        <div class="main-layout">
            <div class="channel-column">
                <script>
                    const beinChannels = [
                        ['Bein Arabic 4K', 967], ['beIN Sports 1', 91], ['beIN Sports 2', 92], ['beIN Sports 3', 93], 
                        ['beIN Sports 4', 94], ['beIN Sports 5', 95], ['beIN Sports 6', 96], ['beIN Sports 7', 97],
                        ['beIN Sports 8', 98], ['beIN Sports 9', 99], ['beIN Sports 10', 100], ['beIN Premium 1', 101],
                        ['beIN Premium 2', 102], ['beIN Premium 3', 103], ['beIN Sports News', 104], ['beIN Xtra 1', 105], ['beIN Xtra 2', 106]
                    ];
                    beinChannels.forEach(ch => {
                        document.write(`<button class="pill-btn" onclick="loadVideo('bein', '${ch[0]}', ${ch[1]})">${ch[0]}</button>`);
                    });
                </script>
            </div>
            <div class="center-area">
                <div class="player-container">
                    <h3 id="name-bein">Select Channel</h3>
                    <iframe id="frame-bein" src="" allowfullscreen></iframe>
                    <div id="servers-bein" class="server-buttons"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="dazn-section" class="page-section">
        <button class="back-btn" onclick="goHome()">← Back</button>
        <div class="main-layout">
            <div class="channel-column">
                <script>
                    const daznChannels = [
                        ['DAZN 1 Bar DE', 426], ['DAZN ES', 4000], ['DAZN 2 Bar DE', 427], ['DAZN 1 Spain', 445], 
                        ['DAZN 2 Spain', 446], ['DAZN 3 Spain', 447], ['DAZN 4 Spain', 448], ['DAZN F1 ES', 537], 
                        ['DAZN LaLiga', 538], ['DAZN Portugal', 918], ['DAZN Ligue 1', 960], ['DAZN ZONA Italy', 877]
                    ];
                    daznChannels.forEach(ch => {
                        document.write(`<button class="pill-btn" onclick="loadVideo('dazn', '${ch[0]}', ${ch[1]})">${ch[0]}</button>`);
                    });
                </script>
            </div>
            <div class="center-area">
                <div class="player-container">
                    <h3 id="name-dazn">Select Channel</h3>
                    <iframe id="frame-dazn" src="" allowfullscreen></iframe>
                    <div id="servers-dazn" class="server-buttons"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showSection(id) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }
        function goHome() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('bein-section').style.display = 'none';
            document.getElementById('dazn-section').style.display = 'none';
        }
        function loadVideo(type, name, id) {
            const frame = document.getElementById('frame-' + type);
            const title = document.getElementById('name-' + type);
            const servers = document.getElementById('servers-' + type);
            
            title.innerText = name;
            const links = [
                `https://dlhd.pk/stream/stream-${id}.php`,
                `https://dlhd.pk/cast/stream-${id}.php`,
                `https://dlhd.pk/watch/stream-${id}.php`,
                `https://dlhd.pk/plus/stream-${id}.php`,
                `https://dlhd.pk/casting/stream-${id}.php`,
                `https://dlhd.pk/player/stream-${id}.php`
            ];
            
            frame.src = links[0];
            servers.innerHTML = '';
            links.forEach((link, i) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn';
                btn.innerText = 'Server ' + (i + 1);
                btn.onclick = () => { frame.src = link; };
                servers.appendChild(btn);
            });
        }
    </script>
</body>
</html>
