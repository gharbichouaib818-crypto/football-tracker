<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-image: url('balla.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #main-menu { display: block; }
        #bein-section { display: none; color: white; text-align: center; }
        
        /* Updated button styles to ensure visibility */
        .nav-btn { 
            background: rgba(255, 255, 255, 0.2); 
            border: 2px solid white; 
            padding: 20px; 
            cursor: pointer; 
            border-radius: 10px;
        }
        .nav-btn img {
            width: 200px; /* Forces the image to be visible */
            height: auto;
        }
    </style>
</head>
<body>

    <!-- Main View -->
    <div id="main-menu">
        <button class="nav-btn" onclick="showBeinPage()">
            <img src="BeIN_Sports_logo.svg" alt="BeIN Sports">
        </button>
    </div>

    <!-- BeIN Sports Page (Empty) -->
    <div id="bein-section">
        <h1>BeIN Sports</h1>
    </div>

    <script>
        function showBeinPage() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('bein-section').style.display = 'block';
        }
    </script>
</body>
</html>
