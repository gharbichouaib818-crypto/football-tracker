        function showChannels() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('channel-menu').style.display = 'block';
            const list = document.getElementById('channel-list');
            beinChannels.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerText = ch.name;
                div.onclick = () => loadPlayer(ch);
                list.appendChild(div);
            });
        }

        function loadPlayer(ch) {
            document.getElementById('current-title').innerText = ch.name;
            const selector = document.getElementById('server-selector');
            selector.innerHTML = '';
            
            // Generate 6 buttons based on the array
            ch.servers.forEach((link, index) => {
                const btn = document.createElement('button');
                btn.className = 's-btn';
                btn.innerText = 'Server ' + (index + 1);
                btn.onclick = () => {
                    document.getElementById('video-frame').src = link;
                };
                selector.appendChild(btn);
            });
            
            // Auto load Server 1
            document.getElementById('video-frame').src = ch.servers[0];
        }
