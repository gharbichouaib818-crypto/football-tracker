<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream</title>
    <!-- Monetag Ad Script -->
    <script src="https://quge5.com/88/tag.min.js" data-zone="251698" async data-cfasync="false"></script>
    
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .ad-container { 
            width: 80%; margin: 50px auto; min-height: 300px; 
            background: rgba(0, 255, 136, 0.2); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; border: 2px dashed #00ff88; 
            border-radius: 12px; padding: 20px;
        }
        #live-stream {
            display: none;
            margin-top: 20px;
        }
        .server-buttons { margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center; }
        .server-btn { background: #00ff88; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; margin: 5px; }
        h2 { color: #ff3333; }
        .instruction-text { font-size: 18px; margin: 10px 0; line-height: 1.6; }
    </style>
</head>
<body>

<div id="partner-spot">
    <div class="ad-container" id="ad-container" style="display: block !important; visibility: visible !important;">
        <div class="instruction-text" id="click-text">(0/10) brave browser استخدام لتخطي الاعلانات</div>
        <div class="instruction-text">استخدم تطبيق <br> Urban VPN <br> وضعه على انجلترا</div>
        <div class="instruction-text" style="color: hsl(0, 100%, 50%); font-weight: bold; border: 1px solid hwb(0 100% 0%); display: block !important;">
            <br> اضغط هنا 10 مرات لتحميل الصفحة
        </div>
    </div>
</div>

<div id="live-stream">
    <h2>🔴 beIN مباشر</h2>
    
    <div class="server-buttons">
        <button class="server-btn" onclick="changeServer(server1Node)">السيرفر 1</button>
        <button class="server-btn" onclick="changeServer(server2Node)">السيرفر 2</button>
        <button class="server-btn" onclick="changeServer(server3Node)">السيرفر 3</button>
        <button class="server-btn" onclick="changeServer(server4Node)">السيرفر 4</button>
        <button class="server-btn" onclick="changeServer(server5Node)">السيرفر 5</button>
    </div>
    
    <div id="video-container">
        <iframe src="https://footybite.ac/fifa-world-cup" width="100%" height="500" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<script>
    // السيرفرات المحدثة
    const server1Node = `<iframe src="https://footybite.ac/fifa-world-cup" width="100%" height="500" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    const server2Node = `<iframe src="https://daddylive.li/embed/embed.php?id=967&player=3&source=tv.json" width="100%" height="500" style="border:0;" allow="autoplay; fullscreen *; picture-in-picture *; encrypted-media" allowfullscreen webkitallowfullscreen mozallowfullscreen></iframe>`;
    const server3Node = `<iframe src="https://dlhd.pk/stream/stream-967.php" width="100%" height="500" style="border:0;" allowfullscreen></iframe>`;
    const server4Node = `<iframe src="https://dlhd.pk/stream/stream-966.php" width="100%" height="500" style="border:0;" allow="autoplay; fullscreen *; picture-in-picture *; encrypted-media" allowfullscreen webkitallowfullscreen mozallowfullscreen></iframe>`;
    const server5Node = `<iframe src="https://daddylive.li/embed/embed.php?id=969&player=1&source=tv.json" width="100%" height="500" style="border:0;" allow="autoplay; fullscreen *; picture-in-picture *; encrypted-media" allowfullscreen webkitallowfullscreen mozallowfullscreen></iframe>`;

    function changeServer(nodeString) {
        document.getElementById('video-container').innerHTML = nodeString;
    }

    // منطق الإعلانات
    let clicks = 0;
    const adContainer = document.getElementById('ad-container');
    const liveStream = document.getElementById('live-stream');
    const clickText = document.getElementById('click-text');

    adContainer.addEventListener('click', () => {
        const urls = ['https://omg10.com/4/11175198', 'https://omg10.com/4/11175191'];
        window.open(urls[clicks % urls.length], '_blank');
        clicks++;
        clickText.innerText = `(${clicks}/10) brave browser استخدام لتخطي الاعلانات`;

        if (clicks >= 10) {
            document.getElementById('partner-spot').style.display = 'none';
            liveStream.style.display = 'block';
        }
    });

    // تسجيل الـ Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
</script>
</body>
</html>
