<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-image: url('balla.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #333;
        }

        /* Main Menu View */
        #main-menu { display: flex; justify-content: center; align-items: center; gap: 30px; height: 100vh; }
        .nav-btn { background: rgba(255, 255, 255, 0.2); border: 2px solid white; padding: 20px; cursor: pointer; border-radius: 10px; transition: background 0.3s, transform 0.2s; }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.05); }
        .nav-btn img { width: 200px; height: auto; }

        /* General Section Styling */
        .page-section { display: none; padding: 20px; }
        .back-btn { background: rgba(255, 255, 255, 0.2); border: 2px solid white; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-bottom: 20px; font-weight: bold; transition: background 0.3s; }
        .back-btn:hover { background: rgba(255, 255, 255, 0.4); }

        /* Layout */
        .main-layout { display: flex; justify-content: center; align-items: flex-start; gap: 20px; max-width: 1300px; margin: 0 auto; }
        .channel-column { display: flex; flex-direction: column; gap: 15px; max-height: 80vh; overflow-y: auto; width: 260px; padding: 10px; scrollbar-width: thin; }
        .channel-column::-webkit-scrollbar { width: 6px; }
        .channel-column::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.5); border-radius: 10px; }

        .pill-btn { border: none; padding: 14px 20px; border-radius: 50px; cursor: pointer; font-size: 14px; font-weight: bold; transition: transform 0.2s, box-shadow 0.3s; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); background-color: #89cff0; }
        .pill-btn:hover { transform: scale(1.05); }
        .color-1 { background-color: #89cff0; } .color-2 { background-color: #48d1cc; } .color-3 { background-color: #f08080; } .color-4 { background-color: #fca311; } .color-5 { background-color: #77dd77; }

        .center-area { display: flex; flex-direction: column; align-items: center; width: 650px; }
        .player-container { background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 15px; text-align: center; width: 100%; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.2); }
        .channel-name { color: white; margin-top: 0; margin-bottom: 15px; }
        iframe { width: 100%; height: 400px; border: none; border-radius: 10px; background: black; }
        .server-buttons { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .server-btn { padding: 10px 20px; border-radius: 20px; border: none; background: #fff; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .server-btn:hover { background: #e0e0e0; }
    </style>
</head>
<body>

    <!-- Main View -->
    <div id="main-menu">
        <button class="nav-btn" onclick="showSection('bein-section')">
            <img src="BeIN_Sports_logo.svg" alt="BeIN Sports">
        </button>
        <button class="nav-btn" onclick="showSection('dazn-section')">
            <img src="DAZN_Channel_(2021)_Logo.svg" alt="DAZN">
        </button>
    </div>

    <!-- BeIN Sports Page -->
    <div id="bein-section" class="page-section">
        <button class="back-btn" onclick="goHome()">← Back to Home</button>
        <div class="main-layout">
            <div class="channel-column">
                <button class="pill-btn color-1" onclick="handleAdClick('Bein Arabic 4K Quality', ['https://dlhd.pk/stream/stream-967.php', 'https://dlhd.pk/cast/stream-967.php', 'https://dlhd.pk/watch/stream-967.php', 'https://dlhd.pk/plus/stream-967.php', 'https://dlhd.pk/casting/stream-967.php', 'https://dlhd.pk/player/stream-967.php'], false)">Bein Arabic 4K Quality</button>
                <button class="pill-btn color-2" onclick="handleAdClick('beIN Sports 1 Arabic', ['https://dlhd.pk/stream/stream-91.php', 'https://dlhd.pk/cast/stream-91.php', 'https://dlhd.pk/watch/stream-91.php', 'https://dlhd.pk/plus/stream-91.php', 'https://dlhd.pk/casting/stream-91.php', 'https://dlhd.pk/player/stream-91.php'], false)">beIN Sports 1 Arabic</button>
                <!-- Add ad trigger to all buttons -->
            </div>
            <div class="center-area">
                <div id="player-container" class="player-container">
                    <h2 id="selected-channel-name" class="channel-name">Select a Channel</h2>
                    <iframe id="video-frame" src="" allow="fullscreen; autoplay; encrypted-media" allowfullscreen></iframe>
                    <div id="server-buttons" class="server-buttons"></div>
                </div>
            </div>
            <div class="channel-column">
                 <button class="pill-btn color-2" onclick="handleAdClick('beIN Sports 2 France', ['https://dlhd.pk/stream/stream-117.php', 'https://dlhd.pk/cast/stream-117.php', 'https://dlhd.pk/watch/stream-117.php', 'https://dlhd.pk/plus/stream-117.php', 'https://dlhd.pk/casting/stream-117.php', 'https://dlhd.pk/player/stream-117.php'], false)">beIN Sports 2 France</button>
            </div>
        </div>
    </div>

    <!-- DAZN Page -->
    <div id="dazn-section" class="page-section">
        <button class="back-btn" onclick="goHome()">← Back to Home</button>
        <div class="main-layout">
            <div class="channel-column">
                <button class="pill-btn color-1" onclick="handleAdClick('DAZN 1 Bar DE', ['https://dlhd.pk/stream/stream-426.php', 'https://dlhd.pk/cast/stream-426.php', 'https://dlhd.pk/watch/stream-426.php', 'https://dlhd.pk/plus/stream-426.php', 'https://dlhd.pk/casting/stream-426.php', 'https://dlhd.pk/player/stream-426.php'], true)">DAZN 1 Bar DE</button>
                <button class="pill-btn color-2" onclick="handleAdClick('DAZN ES', ['https://dlhd.pk/stream/stream-4000.php', 'https://dlhd.pk/cast/stream-4000.php', 'https://dlhd.pk/watch/stream-4000.php', 'https://dlhd.pk/plus/stream-4000.php', 'https://dlhd.pk/casting/stream-4000.php', 'https://dlhd.pk/player/stream-4000.php'], true)">DAZN ES</button>
                <button class="pill-btn color-5" onclick="handleAdClick('DAZN Portugal FIFA Mundial de Clubes', ['https://dlhd.pk/stream/stream-918.php', 'https://dlhd.pk/cast/stream-918.php', 'https://dlhd.pk/watch/stream-918.php', 'https://dlhd.pk/plus/stream-918.php', 'https://dlhd.pk/casting/stream-918.php', 'https://dlhd.pk/player/stream-918.php'], true)">DAZN Portugal FIFA Mundial de Clubes</button>
                <button class="pill-btn color-2" onclick="handleAdClick('DAZN ZONA Italy', ['https://dlhd.pk/stream/stream-877.php', 'https://dlhd.pk/cast/stream-877.php', 'https://dlhd.pk/watch/stream-877.php', 'https://dlhd.pk/plus/stream-877.php', 'https://dlhd.pk/casting/stream-877.php', 'https://dlhd.pk/player/stream-877.php'], true)">DAZN ZONA Italy</button>
            </div>
            <div class="center-area">
                <div id="player-container-dazn" class="player-container">
                    <h2 id="selected-channel-name-dazn" class="channel-name">Select a Channel</h2>
                    <iframe id="video-frame-dazn" src="" allow="fullscreen; autoplay; encrypted-media" allowfullscreen></iframe>
                    <div id="server-buttons-dazn" class="server-buttons"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Ad Rotation Logic
        let adIndex = 0;
        const adLinks = [
            "https://omg10.com/4/11175198",
            "https://omg10.com/4/11175191"
        ];

        function handleAdClick(name, links, isDazn) {
            // 1. Trigger the Ad (One for you)
            window.open(adLinks[adIndex], '_blank');

            // Rotate to next ad for next click
            adIndex = (adIndex + 1) % adLinks.length;

            // 2. Trigger the video (One for me)
            if (isDazn) {
                loadChannelDazn(name, links);
            } else {
                loadChannel(name, links);
            }
        }

        // Standard Functions
        function showSection(sectionId) { document.getElementById('main-menu').style.display = 'none'; document.getElementById(sectionId).style.display = 'block'; }
        function goHome() { document.getElementById('main-menu').style.display = 'flex'; document.getElementById('bein-section').style.display = 'none'; document.getElementById('dazn-section').style.display = 'none'; }

        function loadChannel(name, links) {
            document.getElementById('selected-channel-name').innerText = name;
            document.getElementById('video-frame').src = links[0];
            const serverContainer = document.getElementById('server-buttons');
            serverContainer.innerHTML = ''; 
            links.forEach((link, index) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn';
                btn.innerText = 'Server ' + (index + 1);
                btn.onclick = () => { document.getElementById('video-frame').src = link; };
                serverContainer.appendChild(btn);
            });
        }

        function loadChannelDazn(name, links) {
            document.getElementById('selected-channel-name-dazn').innerText = name;
            document.getElementById('video-frame-dazn').src = links[0];
            const serverContainer = document.getElementById('server-buttons-dazn');
            serverContainer.innerHTML = ''; 
            links.forEach((link, index) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn';
                btn.innerText = 'Server ' + (index + 1);
                btn.onclick = () => { document.getElementById('video-frame-dazn').src = link; };
                serverContainer.appendChild(btn);
            });
        }
    </script>
</body>
</html>
