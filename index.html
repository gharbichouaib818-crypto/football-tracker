<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-image: url('balla.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            color: white;
        }
        #main-menu { display: block; }
        #bein-section { display: none; text-align: center; }
        
        .nav-btn { 
            background: rgba(255, 255, 255, 0.2); 
            border: 2px solid white; 
            padding: 20px; 
            cursor: pointer; 
            border-radius: 10px;
        }
        .nav-btn img { width: 200px; height: auto; }

        /* Channel Button Styling */
        .channel-btn {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 auto;
        }
        .channel-icon { width: 20px; height: 20px; }

        /* Player Styles */
        #player-container { margin-top: 20px; }
        /* Added allowfullscreen and allow attributes to the iframe below */
        iframe { width: 800px; height: 450px; border: 2px solid white; background: black; }
        .server-btn { margin: 5px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Main View -->
    <div id="main-menu">
        <button class="nav-btn" onclick="showBeinPage()">
            <img src="BeIN_Sports_logo.svg" alt="BeIN Sports">
        </button>
    </div>

    <!-- BeIN Sports Page -->
    <div id="bein-section">
        <h1>BeIN Sports</h1>
        
        <!-- Updated Channel Button with Logo -->
        <button onclick="showPlayer()" class="channel-btn">
            <img src="BeIN_Sports_logo.svg" class="channel-icon">
            Bein Arabic 4K Quality
        </button>

        <!-- Player and Servers -->
        <div id="player-container" style="display: none;">
            <iframe id="video-frame" 
                    src="" 
                    allow="fullscreen; autoplay; encrypted-media" 
                    allowfullscreen>
            </iframe>
            <br>
            <button class="server-btn" onclick="loadServer('https://dlhd.pk/stream/stream-5013.php')">Server 1</button>
            <button class="server-btn" onclick="loadServer('https://dlhd.pk/cast/stream-5013.php')">Server 2</button>
            <button class="server-btn" onclick="loadServer('https://dlhd.pk/watch/stream-5013.php')">Server 3</button>
            <button class="server-btn" onclick="loadServer('https://dlhd.pk/plus/stream-5013.php')">Server 4</button>
            <button class="server-btn" onclick="loadServer('https://dlhd.pk/casting/stream-5013.php')">Server 5</button>
            <button class="server-btn" onclick="loadServer('https://dlhd.pk/player/stream-5013.php')">Server 6</button>
        </div>
    </div>

    <script>
        function showBeinPage() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('bein-section').style.display = 'block';
        }

        function showPlayer() {
            document.getElementById('player-container').style.display = 'block';
        }

        function loadServer(link) {
            document.getElementById('video-frame').src = link;
        }
    </script>
</body>
</html>
