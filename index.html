<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Streaming Hub</title>
    <style>
        body {
            background-image: url('balla.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #333;
        }

        #main-menu { display: flex; justify-content: center; align-items: center; gap: 30px; height: 100vh; }
        
        .nav-btn { background: rgba(255, 255, 255, 0.2); border: 2px solid white; padding: 20px; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.05); }
        .nav-btn img { width: 200px; height: auto; }

        .page-section { display: none; padding: 20px; }
        
        .back-btn { background: rgba(255, 255, 255, 0.2); border: 2px solid white; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        
        /* Unified Layout for Sections */
        .main-layout { display: flex; justify-content: center; align-items: flex-start; gap: 20px; max-width: 1300px; margin: 0 auto; }

        .channel-column { display: flex; flex-direction: column; gap: 10px; max-height: 80vh; overflow-y: auto; width: 260px; padding: 10px; scrollbar-width: thin; }
        
        .pill-btn { border: none; padding: 12px; border-radius: 50px; cursor: pointer; font-size: 13px; font-weight: bold; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.2s; }
        .pill-btn:hover { transform: scale(1.05); }

        /* Colors */
        .color-1 { background-color: #89cff0; }
        .color-2 { background-color: #48d1cc; }
        .color-3 { background-color: #f08080; }
        .color-4 { background-color: #fca311; }
        .color-5 { background-color: #77dd77; }

        /* Unified Player */
        .center-area { display: flex; flex-direction: column; align-items: center; width: 650px; }
        #player-container { background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 15px; text-align: center; width: 100%; border: 2px solid rgba(255,255,255,0.2); }
        iframe { width: 100%; height: 400px; border: none; border-radius: 10px; background: black; }
        #server-buttons { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .server-btn { padding: 8px 16px; border-radius: 20px; border: none; background: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-menu">
        <button class="nav-btn" onclick="showSection('bein-section')"><img src="BeIN_Sports_logo.svg" alt="BeIN"></button>
        <button class="nav-btn" onclick="showSection('dazn-section')"><img src="DAZN_Channel_(2021)_Logo.svg" alt="DAZN"></button>
    </div>

    <!-- The Global Player Component (Shared by both) -->
    <div id="player-view" style="display:none;">
        <button class="back-btn" onclick="goHome()">← Back to Home</button>
        <div id="section-content" class="main-layout">
            <!-- Left Column -->
            <div id="col-left" class="channel-column"></div>
            
            <!-- Center Player -->
            <div class="center-area">
                <div id="player-container">
                    <h2 id="selected-channel-name" style="color:white;">Select a Channel</h2>
                    <iframe id="video-frame" src="" allow="fullscreen; autoplay; encrypted-media" allowfullscreen></iframe>
                    <div id="server-buttons"></div>
                </div>
            </div>

            <!-- Right Column -->
            <div id="col-right" class="channel-column"></div>
        </div>
    </div>

    <script>
        // Channel Data
        const channels = {
            'bein': [
                {name: 'Bein Arabic 4K', links: ['https://dlhd.pk/stream/stream-967.php', 'https://dlhd.pk/cast/stream-967.php', 'https://dlhd.pk/watch/stream-967.php', 'https://dlhd.pk/plus/stream-967.php', 'https://dlhd.pk/casting/stream-967.php', 'https://dlhd.pk/player/stream-967.php']},
                {name: 'beIN Sports 1', links: ['https://dlhd.pk/stream/stream-91.php', 'https://dlhd.pk/cast/stream-91.php', 'https://dlhd.pk/watch/stream-91.php', 'https://dlhd.pk/plus/stream-91.php', 'https://dlhd.pk/casting/stream-91.php', 'https://dlhd.pk/player/stream-91.php']},
                // ... Add all BeIN channels here
            ],
            'dazn': [
                {name: 'DAZN 1 Bar DE', links: ['https://dlhd.pk/stream/stream-426.php', 'https://dlhd.pk/cast/stream-426.php', 'https://dlhd.pk/watch/stream-426.php', 'https://dlhd.pk/plus/stream-426.php', 'https://dlhd.pk/casting/stream-426.php', 'https://dlhd.pk/player/stream-426.php']},
                {name: 'DAZN ES', links: ['https://dlhd.pk/stream/stream-4000.php', 'https://dlhd.pk/cast/stream-4000.php', 'https://dlhd.pk/watch/stream-4000.php', 'https://dlhd.pk/plus/stream-4000.php', 'https://dlhd.pk/casting/stream-4000.php', 'https://dlhd.pk/player/stream-4000.php']},
                {name: 'DAZN 2 Bar DE', links: ['https://dlhd.pk/stream/stream-427.php', 'https://dlhd.pk/cast/stream-427.php', 'https://dlhd.pk/watch/stream-427.php', 'https://dlhd.pk/plus/stream-427.php', 'https://dlhd.pk/casting/stream-427.php', 'https://dlhd.pk/player/stream-427.php']},
                {name: 'DAZN 1 Spain', links: ['https://dlhd.pk/stream/stream-445.php', 'https://dlhd.pk/cast/stream-445.php', 'https://dlhd.pk/watch/stream-445.php', 'https://dlhd.pk/plus/stream-445.php', 'https://dlhd.pk/casting/stream-445.php', 'https://dlhd.pk/player/stream-445.php']},
                {name: 'DAZN 2 Spain', links: ['https://dlhd.pk/stream/stream-446.php', 'https://dlhd.pk/cast/stream-446.php', 'https://dlhd.pk/watch/stream-446.php', 'https://dlhd.pk/plus/stream-446.php', 'https://dlhd.pk/casting/stream-446.php', 'https://dlhd.pk/player/stream-446.php']},
                {name: 'DAZN 3 Spain', links: ['https://dlhd.pk/stream/stream-447.php', 'https://dlhd.pk/cast/stream-447.php', 'https://dlhd.pk/watch/stream-447.php', 'https://dlhd.pk/plus/stream-447.php', 'https://dlhd.pk/casting/stream-447.php', 'https://dlhd.pk/player/stream-447.php']},
                {name: 'DAZN 4 Spain', links: ['https://dlhd.pk/stream/stream-448.php', 'https://dlhd.pk/cast/stream-448.php', 'https://dlhd.pk/watch/stream-448.php', 'https://dlhd.pk/plus/stream-448.php', 'https://dlhd.pk/casting/stream-448.php', 'https://dlhd.pk/player/stream-448.php']},
                {name: 'DAZN F1 ES', links: ['https://dlhd.pk/stream/stream-537.php', 'https://dlhd.pk/cast/stream-537.php', 'https://dlhd.pk/watch/stream-537.php', 'https://dlhd.pk/plus/stream-537.php', 'https://dlhd.pk/casting/stream-537.php', 'https://dlhd.pk/player/stream-537.php']},
                {name: 'DAZN LaLiga', links: ['https://dlhd.pk/stream/stream-538.php', 'https://dlhd.pk/cast/stream-538.php', 'https://dlhd.pk/watch/stream-538.php', 'https://dlhd.pk/plus/stream-538.php', 'https://dlhd.pk/casting/stream-538.php', 'https://dlhd.pk/player/stream-538.php']},
                {name: 'DAZN Portugal', links: ['https://dlhd.pk/stream/stream-918.php', 'https://dlhd.pk/cast/stream-918.php', 'https://dlhd.pk/watch/stream-918.php', 'https://dlhd.pk/plus/stream-918.php', 'https://dlhd.pk/casting/stream-918.php', 'https://dlhd.pk/player/stream-918.php']},
                {name: 'DAZN Ligue 1', links: ['https://dlhd.pk/stream/stream-960.php', 'https://dlhd.pk/cast/stream-960.php', 'https://dlhd.pk/watch/stream-960.php', 'https://dlhd.pk/plus/stream-960.php', 'https://dlhd.pk/casting/stream-960.php', 'https://dlhd.pk/player/stream-960.php']},
                {name: 'DAZN ZONA Italy', links: ['https://dlhd.pk/stream/stream-877.php', 'https://dlhd.pk/cast/stream-877.php', 'https://dlhd.pk/watch/stream-877.php', 'https://dlhd.pk/plus/stream-877.php', 'https://dlhd.pk/casting/stream-877.php', 'https://dlhd.pk/player/stream-877.php']}
            ]
        };

        function showSection(type) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('player-view').style.display = 'block';
            renderChannels(type);
        }

        function renderChannels(type) {
            const leftCol = document.getElementById('col-left');
            const rightCol = document.getElementById('col-right');
            leftCol.innerHTML = '';
            rightCol.innerHTML = '';
            
            channels[type].forEach((ch, index) => {
                const btn = document.createElement('button');
                btn.className = 'pill-btn color-' + ((index % 5) + 1);
                btn.innerText = ch.name;
                btn.onclick = () => loadChannel(ch.name, ch.links);
                
                if (index < 6) leftCol.appendChild(btn);
                else rightCol.appendChild(btn);
            });
        }

        function loadChannel(name, links) {
            document.getElementById('selected-channel-name').innerText = name;
            document.getElementById('video-frame').src = links[0];
            const container = document.getElementById('server-buttons');
            container.innerHTML = '';
            links.forEach((link, i) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn';
                btn.innerText = 'Server ' + (i + 1);
                btn.onclick = () => { document.getElementById('video-frame').src = link; };
                container.appendChild(btn);
            });
        }

        function goHome() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('player-view').style.display = 'none';
        }
    </script>
</body>
</html>
