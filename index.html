<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shabaka.io / شبكة.io</title>
    <script src="https://quge5.com/88/tag.min.js" data-zone="251698" async data-cfasync="false"></script>
    
    <style>
        :root { --primary-color: #00ff88; --glass-bg: rgba(20, 20, 20, 0.85); }
        body { background-image: url('ball.jpg'); background-size: cover; background-position: center; background-attachment: fixed; color: #ffffff; font-family: sans-serif; margin: 0; }
        
        .navbar { background-color: var(--glass-bg); padding: 15px 40px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--primary-color); backdrop-filter: blur(8px); }
        .main-container { max-width: 1200px; margin: 50px auto; padding: 30px; background-color: var(--glass-bg); border-radius: 15px; text-align: center; }

        /* Partner Spot styling */
        .partner-spot { width: 100%; text-align: center; margin: 20px 0; }
        .ad-container { width: 100%; height: 500px; background: #333; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px dashed var(--primary-color); border-radius: 12px; }
        
        .live-video-node { background: rgba(0, 0, 0, 0.6); border: 2px solid var(--primary-color); border-radius: 12px; padding: 20px; margin-bottom: 40px; }
        .match-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .match-card { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 10px; }
        .flag { width: 70px; height: auto; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="navbar"><h1>Shabaka<span>.io</span></h1></div>

    <div class="partner-spot" id="partner-spot">
        <div class="ad-container" id="ad-container">
            <h2 id="click-text">CLICK HERE TO SUPPORT & UNLOCK STREAM (0/5)</h2>
        </div>
    </div>

    <div class="main-container">
        <div class="live-video-node" id="live-stream" style="display: none;">
            <h3 style="color: #ff3333;">🔴 LIVE NOW</h3>
            <iframe src="https://sports.streamingworld.xyz/embed/eyJzbHVnIjoiYnJhemlsLXZzLWhhaXRpLTgxMTMwNjI1Iiwic3RyZWFtIjo2LCJ0cyI6MTc4MTkxODM3NX0.oV4-VaXhkNwtmopxb4ZwX6i21u1ZCwUHRZLvMF3MSN0" width="100%" height="500" frameborder="0" allowfullscreen></iframe>
        </div>

        <h2>Upcoming Matches</h2>
        <div class="match-grid">
            <!-- (Your matches list remains the same) -->
        </div>
    </div>

    <script>
        let clicks = 0;
        const adContainer = document.getElementById('ad-container');
        const liveStream = document.getElementById('live-stream');
        const clickText = document.getElementById('click-text');

        adContainer.addEventListener('click', () => {
            // Open your affiliate link
            window.open('https://omg10.com/4/11175203', '_blank');
            
            clicks++;
            clickText.innerText = `CLICK HERE TO SUPPORT & UNLOCK STREAM (${clicks}/5)`;

            if (clicks >= 5) {
                document.getElementById('partner-spot').style.display = 'none';
                liveStream.style.display = 'block';
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
