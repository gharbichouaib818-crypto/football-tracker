    <style>
        body {
            background-image: url('balla.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #333;
        }

        /* Main Menu View */
        #main-menu { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 30px; 
            height: 100vh; 
        }
        
        .nav-btn { 
            background: rgba(255, 255, 255, 0.2); 
            border: 2px solid white; 
            padding: 20px; 
            cursor: pointer; 
            border-radius: 10px;
            transition: background 0.3s, transform 0.2s;
        }
        .nav-btn:hover { 
            background: rgba(255, 255, 255, 0.4); 
            transform: scale(1.05);
        }
        .nav-btn img { width: 200px; height: auto; }

        /* General Section Styling */
        .page-section { display: none; padding: 20px; }

        /* Back Button Style */
        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.4); }

        /* BeIN Sports Layout */
        .main-layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .channel-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 80vh;
            overflow-y: auto;
            width: 260px;
            padding: 10px;
            scrollbar-width: thin;
        }
        .channel-column::-webkit-scrollbar { width: 6px; }
        .channel-column::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.5); border-radius: 10px; }

        .pill-btn {
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.3s;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            background-color: #89cff0; /* Default color */
        }
        .pill-btn:hover { transform: scale(1.05); }

        .color-1 { background-color: #89cff0; }
        .color-2 { background-color: #48d1cc; }
        .color-3 { background-color: #f08080; }
        .color-4 { background-color: #fca311; }
        .color-5 { background-color: #77dd77; }

        .center-area { display: flex; flex-direction: column; align-items: center; width: 650px; }
        
        #player-container { 
            background: rgba(0, 0, 0, 0.8); 
            padding: 20px; 
            border-radius: 15px;
            text-align: center;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        #selected-channel-name { color: white; margin-top: 0; margin-bottom: 15px; }

        iframe { width: 100%; height: 400px; border: none; border-radius: 10px; background: black; }
        
        #server-buttons { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        
        .server-btn { 
            padding: 10px 20px; border-radius: 20px; border: none; background: #fff; 
            font-weight: bold; cursor: pointer; transition: background 0.2s;
        }
        .server-btn:hover { background: #e0e0e0; }

        #dazn-section { text-align: center; color: white; margin-top: 50px; }
    </style>
</head>

    <script>
        function showSection(sectionId) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById(sectionId).style.display = 'block';
        }

        function goHome() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('bein-section').style.display = 'none';
            document.getElementById('dazn-section').style.display = 'none';
        }

        function loadChannel(name, links) {
            document.getElementById('selected-channel-name').innerText = name;
            document.getElementById('video-frame').src = links[0];
            
            const serverContainer = document.getElementById('server-buttons');
            serverContainer.innerHTML = ''; 
            
            links.forEach((link, index) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn';
                btn.innerText = 'Server ' + (index + 1);
                btn.onclick = () => { document.getElementById('video-frame').src = link; };
                serverContainer.appendChild(btn);
            });
        }
    </script>
