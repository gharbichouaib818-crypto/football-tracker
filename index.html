        .channel-column { display: flex; flex-direction: column; gap: 10px; max-height: 80vh; overflow-y: auto; width: 260px; padding: 10px; scrollbar-width: thin; }

        .color-3 { background-color: #f08080; }
        .color-4 { background-color: #fca311; }
        .color-5 { background-color: #77dd77; }

        /* Player */

        #player-container { background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 15px; text-align: center; width: 100%; border: 2px solid rgba(255,255,255,0.2); }
        iframe { width: 100%; height: 400px; border: none; border-radius: 10px; background: black; }
        #server-buttons { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .server-btn { padding: 8px 16px; border-radius: 20px; border: none; background: #fff; font-weight: bold; cursor: pointer; }
    </style>

    <script>
        function showSection(sectionId) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById(sectionId).style.display = 'block';
        }

        function goHome() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('bein-section').style.display = 'none';
            document.getElementById('dazn-section').style.display = 'none';
        }

        // Logic to determine which player to update based on current page
        function loadChannel(name, links) {
            const isDazn = document.getElementById('dazn-section').style.display === 'block';
            
            // Set targets based on active section
            const nameEl = isDazn ? document.getElementById('selected-channel-name-dazn') : document.getElementById('selected-channel-name');
            const frameEl = isDazn ? document.getElementById('video-frame-dazn') : document.getElementById('video-frame');
            const btnCont = isDazn ? document.getElementById('server-buttons-dazn') : document.getElementById('server-buttons');

            nameEl.innerText = name;
            frameEl.src = links[0];
            btnCont.innerHTML = '';
            
            links.forEach((link, i) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn';
                btn.innerText = 'Server ' + (i + 1);
                btn.onclick = () => { frameEl.src = link; };
                btnCont.appendChild(btn);
            });
        }
    </script>
