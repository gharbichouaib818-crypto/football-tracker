<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #121212; color: white; }

        /* The Button Styling */
        .category-card {
            width: 200px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 10px;
            cursor: pointer; /* This creates the hand cursor */
            text-align: center;
            border: 2px solid #333;
            position: relative; /* Essential for z-index */
            z-index: 100; /* Puts the button on top of the ads */
            transition: 0.3s;
        }

        .category-card:hover {
            border-color: #007bff;
            transform: scale(1.05);
        }

        .category-card img { width: 100%; height: auto; }

        /* Ad Unit Styling - Pushed to back */
        .ad-container {
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            z-index: 1; /* Ads sit behind the buttons */
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- This is your clickable button -->
    <div class="category-card" onclick="alert('BeIN Section Clicked!')">
        <img src="BeIN_Sports_logo.svg" alt="BeIN Sports">
        <p>BeIN Sports</p>
    </div>

    <!-- Ad Unit -->
    <div class="ad-container">
        <iframe data-aa=2445577 src=//acceptable.a-ads.com/2445577/?size=Adaptive style='border:0; padding:0; width:70%; height:auto; overflow:hidden;'></iframe>
    </div>

    <script>
        // Placeholder for future logic
        function showBeinChannels() {
            console.log("BeIN Section Clicked!");
        }
    </script>
</body>
</html>
